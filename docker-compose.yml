services:
  wavereader:
    build: .
    image: wavereader-gpu:latest
    container_name: wavereader-gpu
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8000"
    env_file:
      - .env
    volumes:
      # Your IC-7610 transfer directory on the host. Read-WRITE so the trash-can
      # delete can remove files from disk. Edit the left side to your path.
      - ${RECORDINGS_DIR:-/data1/recordings/incoming}:/data/incoming
      # Persistent app state: SQLite db, uploaded files, downloaded model weights.
      - wavereader-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  wavereader-data:
