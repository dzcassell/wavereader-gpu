<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>wavereader-gpu</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>📻 wavereader-gpu</h1>
    <span id="gpu" class="health" title="GPU telemetry">GPU …</span>
    <button id="heardBtn" class="chipbtn" title="Callsigns / Q-codes / frequencies heard, and watch terms">Heard &amp; alerts</button>
    <button id="freeBtn" class="chipbtn" title="Release all cached models from VRAM">Free models</button>
    <span id="health" class="health" title="transcription engine status">…</span>
  </header>

  <section class="dropzone" id="dropzone">
    <p>Drop .wav files here or <label class="link">browse<input type="file" id="fileInput" accept=".wav,.flac,.mp3,.m4a,.ogg" multiple hidden></label> to upload.</p>
    <p class="muted">Files copied into the watched directory are picked up automatically.</p>
    <div id="uploadStatus"></div>
  </section>

  <div class="settingsbar">
    <label class="check"><input type="checkbox" id="recursive"> Scan recursively</label>
    <label class="check"><input type="checkbox" id="alertsOnly"> 🔔 alerts only</label>
    <span class="muted">Watching: <code id="scanDir">…</code></span>
  </div>

  <section class="heardpanel" id="heardpanel" hidden>
    <div class="heardcols">
      <div class="heardcol">
        <div class="heard-head">
          <strong>Heard</strong>
          <select id="entType" class="loglevel">
            <option value="all">All</option>
            <option value="callsign">Callsigns</option>
            <option value="qcode">Q-codes</option>
            <option value="frequency">Frequencies</option>
          </select>
          <button id="entRefresh" class="chipbtn">Refresh</button>
        </div>
        <div id="entList" class="entlist"></div>
      </div>
      <div class="heardcol">
        <div class="heard-head"><strong>Watch terms</strong>
          <span class="muted">one per line — flags matching transcripts 🔔</span></div>
        <textarea id="watchTerms" class="watchbox" placeholder="W1AW&#10;mayday&#10;14.205"></textarea>
        <div class="heard-head">
          <button id="watchSave" class="chipbtn">Save terms</button>
          <button id="reindexBtn" class="chipbtn" title="Recompute entities + alerts for all transcripts">Re-index all</button>
          <span id="watchInfo" class="muted"></span>
        </div>
      </div>
    </div>
  </section>

  <div class="searchbar">
    <input type="search" id="search" placeholder="Search filenames and transcripts…" autocomplete="off">
    <span id="searchInfo" class="muted"></span>
  </div>

  <div class="searchresults" id="searchResults" hidden></div>

  <div class="progress" id="progress" hidden>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <span class="muted" id="pinfo"></span>
  </div>

  <table id="table">
    <thead>
      <tr><th></th><th>File</th><th>Source</th><th>Status</th><th>Duration</th><th></th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <section class="logpanel">
    <div class="loghead">
      <button id="logToggle" class="chipbtn">▶ Logs</button>
      <select id="logLevel" class="loglevel" hidden>
        <option value="">All</option>
        <option value="DEBUG">Debug+</option>
        <option value="INFO" selected>Info+</option>
        <option value="WARNING">Warning+</option>
        <option value="ERROR">Error only</option>
      </select>
      <span id="logInfo" class="muted"></span>
    </div>
    <pre id="logOutput" class="logout" hidden></pre>
  </section>

  <script src="/app.js"></script>
</body>
</html>
